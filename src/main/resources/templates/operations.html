<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head">
    <title>Operations Management</title>
</head>
<body>
    <div th:fragment="content">
        <h1>Operations Management</h1>

        <div class="form-section">
            <h2>Create New Operation</h2>
            <form id="operationForm">
                <div>
                    <label for="operationAmount">Amount:</label>
                    <input type="number" id="operationAmount" step="0.01" required>
                </div>
                <div>
                    <label for="operationDescription">Description:</label>
                    <input type="text" id="operationDescription" required>
                </div>
                <button type="submit">Create Operation</button>
            </form>
        </div>

        <div class="list-section">
            <h2>Operations List</h2>
            <table id="operationsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Amount</th>
                        <th>Description</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <script src="/js/operations.js"></script>
    </div>
</body>
</html>
