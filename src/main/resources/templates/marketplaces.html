<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head}">
    <title>Marketplaces Management</title>
</head>
<body>
<div th:fragment="content">
    <div class="header-section">
        <h1>Мои маркетплейсы</h1>
        <button id="toggleFormBtn" class="add-new-btn">Добавить новый</button>
    </div>

    <!-- Форма (изначально скрыта) -->
    <div id="marketplaceFormContainer" style="display: none;">
        <div class="form-section">
            <h2>Новый маркетплейс</h2>
            <form id="marketplaceForm">
                <div class="form-group">
                    <label for="marketplaceName">Название:</label>
                    <input type="text" id="marketplaceName" required>
                </div>
                <div class="form-group">
                        <label for="marketplaceComment">Комментарий:</label>
                        <textarea id="marketplaceComment" rows="3"></textarea>
                </div>
                <div class="form-group">
                        <label for="marketplaceWeb">Веб-сайт:</label>
                        <input type="url" id="marketplaceWeb">
                    </div>
                    <div class="form-group">
                        <label for="marketplaceType">Тип:</label>
                        <select id="marketplaceType" required>
                            <option value="Продукты">Продукты</option>
                            <option value="Строительный">Строительный</option>
                            <option value="Онлайн">Онлайн</option>
                            <option value="Доставка">Доставка</option>
                            <option value="Фастфуд">Фастфуд</option>
                            <option value="Ресторан">Ресторан</option>
                            <option value="Такси">Такси</option>
                            <option value="Другой">Другой (укажите)</option>
                        </select>
                        <input type="text" id="customType" style="display: none; margin-top: 5px;" placeholder="Укажите тип">
                    </div>
                    <div class="form-group">
                        <label for="marketplaceDiscountCard">ID дисконтной карты:</label>
                        <input type="text" id="marketplaceDiscountCard">
                    </div>
                    <button type="submit" class="create-btn">Создать маркетплейс</button>
                </form>
            </div>
        </div>

        <div class="list-section">
            <div class="header-section">
                <h2>Таблица маркетплейсов</h2>
                <button id="editButton" class="edit-btn">Редактировать</button>
            </div>
            <table id="marketplacesTable" class="editable-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Комментарий</th>
                        <th>Веб-сайт</th>
                        <th>Тип</th>
                        <th>Дисконтная карта</th>
                    </tr>
                </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="/js/marketplaces.js"></script>
</div>
</body>
</html>
