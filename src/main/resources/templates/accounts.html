<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head">
    <title>Accounts Management</title>
</head>
<body>
    <div th:fragment="content">
        <div class="header-section">
            <h1>Мои счета</h1>
            <button id="toggleFormBtn" class="add-new-btn">Добавить новый</button>
        </div>

        <!-- Форма (изначально скрыта) -->
        <div id="accountFormContainer" style="display: none;">
            <div class="form-section">
                <h2>Новый счет</h2>
                <form id="accountForm">
            <div class="form-group">
                        <label for="accountName">Название:</label>
                        <input type="text" id="accountName" required>
                    </div>
            <div class="form-group">
                        <label for="accountBalance">Начальный остаток:</label>
                        <input type="number" id="accountBalance" step="0.01" value="0.00" required>
            </div>
                    <div class="form-group">
                        <label for="accountType">Тип карты:</label>
                        <select id="accountType" required>
                            <option value="DEBIT_CARD">DEBIT</option>
                            <option value="CREDIT_CARD">CREDIT</option>
                        </select>
    </div>
                    <div class="form-group">
                        <label for="accountNumber">Номер счета:</label>
                        <input type="text" id="accountNumber" required>
    </div>
                    <button type="submit" class="create-btn">Создать счет</button>
                </form>
    </div>
        </div>

        <div class="list-section">
            <table id="accountsTable">
                <thead>
                    <tr>
                        <th>Название</th>
                        <th>Остаток</th>
                        <th>Тип карты</th>
                        <th>Номер счета</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <script src="/js/accounts.js"></script>
    </div>
</body>
</html>
